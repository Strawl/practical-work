      num_layers: 3
      num_latent_channels: 512
      omega: 23.0
    training:
      target_density: 0.58
      penalty: 0.003
      neumann_boundary_conditions: "cantilever_mid"

  - model_type: SIREN
    model_kwargs:
      num_channels_in: 2
