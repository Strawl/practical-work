training:
  Lx: 60.0
  Ly: 30.0
  scale: 3
  dirichlet_boundary_conditions: "cantilever_left_support"

  num_iterations: 125
  lr: 0.001
  jitted_coords: false
  grad_clip_norm: 1.0
  max_consecutive_errors: 30
  train_rng_seed: 534
  model_rng_seed: 324
  helmholtz_radius: 0.0
  plateau:
    patience: 20
    cooldown: 0
    factor: 0.5
    rtol: 0.05
    accumulation_size: 1

models:
  - model_type: SIREN
    model_kwargs:
      num_channels_in: 2
      num_channels_out: 1
      num_layers: 3
      num_latent_channels: 512
      omega: 23.0
    training:
      target_density: 0.5
      penalty: 10
      neumann_boundary_conditions: "cantilever_corner"

  - model_type: SIREN
    model_kwargs:
      num_channels_in: 2
      num_channels_out: 1
      num_layers: 3
      num_latent_channels: 512
      omega: 23.0
    training:
      target_density: 0.5
      penalty: 10
      neumann_boundary_conditions: "cantilever_mid"

  - model_type: SIREN
    model_kwargs:
      num_channels_in: 2
      num_channels_out: 1
      num_layers: 3
      num_latent_channels: 512
      omega: 23.0
    training:
      target_density: 0.5
      penalty: 10
      neumann_boundary_conditions: "cantilever_corner"

  - model_type: SIREN
    model_kwargs:
      num_channels_in: 2
      num_channels_out: 1
      num_layers: 3
      num_latent_channels: 512
      omega: 23.0
    training:
      target_density: 0.5
      penalty: 10
      neumann_boundary_conditions: "cantilever_corner"
