    num_hidden_units: 64
    omega: 20.0
    num_input_units: 2
    num_output_units: 1
  training:
    target_density: 0.5
    penalty: 0.09
    neumann_boundary_conditions: cantilever_corner
- model_type: SIREN
  model_kwargs:
    num_hidden_layers: 5
